name: flag-service-CI
run-name: Deploy to ${{ inputs.deploy_target }} by @${{ github.actor }}

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  id-token: write

jobs:
  build_test:
    name: Build & unit test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependences
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      
      - name: Execute test
        run: |
          if [ -d tests ] || ls test_*.py *_test.py >/dev/null 2>&1; then
            pytest -q
          else
            echo "No unit tests found. Skipping pytest."
          fi

  lint:
    name: Linter / Static Analysis
    runs-on: ubuntu-latest
    needs: build_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          flake8 .

  security_scan:
    name: Security Scan (SAST & SCA)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: SAST with Bandit (report only)
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install bandit
          bandit -r . -x .venv,venv -lll

      - name: SCA with Trivy (fail on CRITICAL)
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            aquasec/trivy:0.63.0 fs \
            --severity CRITICAL \
            --exit-code 1 \
            --ignore-unfixed \
            /src

  docker_build_push:
    name: Docker Build & Push (ECR)
    runs-on: ubuntu-latest
    needs: security_scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
      IMAGE_VERSION: v1.0.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to AWS ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: image
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          IMAGE_TAG="${IMAGE_VERSION}-${SHORT_SHA}"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: docker build -t "${{ steps.image.outputs.uri }}" .

      - name: Container scan with Trivy (fail on HIGH/CRITICAL)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.63.0 image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed \
            "${{ steps.image.outputs.uri }}"

      - name: Push image to AWS ECR
        run: docker push "${{ steps.image.outputs.uri }}"

  tag_external_repo:
    name: Create tag in external repository
    runs-on: ubuntu-latest
    needs: docker_build_push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout external repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.TARGET_REPO }}
          token: ${{ secrets.TARGET_REPO_PAT }}
          path: external-repo
          fetch-depth: 0

      - name: Create and push tag
        working-directory: external-repo
        env:
          SOURCE_IMAGE_TAG: ${{ needs.docker_build_push.outputs.image_tag }}
          INITIAL_TAG: v1.0.0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags origin

          LAST_TAG="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1)"
          if [ -z "${LAST_TAG}" ]; then
            TAG_NAME="${INITIAL_TAG}"
          else
            VERSION="${LAST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION}"
            PATCH=$((PATCH + 1))
            TAG_NAME="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          if git ls-remote --tags origin "refs/tags/${TAG_NAME}" | grep -q "${TAG_NAME}"; then
            echo "Tag ${TAG_NAME} already exists in external repository. Skipping."
            exit 0
          fi

          git tag -a "${TAG_NAME}" -m "Release ${TAG_NAME} from ${GITHUB_REPOSITORY}@${GITHUB_SHA} (image ${SOURCE_IMAGE_TAG})"
          git push origin "refs/tags/${TAG_NAME}"
