name: flag-service-CI
run-name: Deploy to ${{ inputs.deploy_target }} by @${{ github.actor }}

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build_test:
    name: Build & unit test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependences
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      
      - name: Execute test
        run: |
          if [ -d tests ] || ls test_*.py *_test.py >/dev/null 2>&1; then
            pytest -q
          else
            echo "No unit tests found. Skipping pytest."
          fi

  lint:
    name: Linter / Static Analysis
    runs-on: ubuntu-latest
    needs: build_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          flake8 .

  security_scan:
    name: Security Scan (SAST & SCA)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: SAST with Bandit (report only)
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install bandit
          bandit -r . -x .venv,venv -lll

      - name: SCA with Trivy (fail on CRITICAL)
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            aquasec/trivy:0.63.0 fs \
            --severity CRITICAL \
            --exit-code 1 \
            --ignore-unfixed \
            /src